<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Calgary CTrain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #aeb6bd; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }
  #hud {
    position: fixed; top: env(safe-area-inset-top, 12px); left: 14px;
    font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
    color: #1c2329; pointer-events: none; text-shadow: 0 1px 2px rgba(255,255,255,.5);
  }
  #hud .title { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
  #hud .sub { font-size: 12px; opacity: .8; margin-top: 2px; }
  #hint {
    position: fixed; bottom: env(safe-area-inset-bottom, 12px); left: 0; right: 0;
    text-align: center; font-family: system-ui, sans-serif; font-size: 12px;
    color: #1c2329; opacity: .6; pointer-events: none;
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <div class="title">🚆 Calgary CTrain</div>
  <div class="sub">live loop around the city</div>
</div>
<div id="hint">drag to look around · pinch to zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ---------- renderer / scene / camera ----------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xaeb6bd);
scene.fog = new THREE.Fog(0xaeb6bd, 160, 360);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 2000);

// ---------- lighting ----------
scene.add(new THREE.HemisphereLight(0xffffff, 0x6b7280, 0.9));
const sun = new THREE.DirectionalLight(0xffffff, 1.15);
sun.position.set(80, 130, 50);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 10;
sun.shadow.camera.far = 420;
const S = 220;
sun.shadow.camera.left = -S; sun.shadow.camera.right = S;
sun.shadow.camera.top = S; sun.shadow.camera.bottom = -S;
sun.shadow.bias = -0.0004;
scene.add(sun);
scene.add(sun.target);

// ---------- ground ----------
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1400, 1400),
  new THREE.MeshStandardMaterial({ color: 0x8a9a82, roughness: 1 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// faint grid for scale
const grid = new THREE.GridHelper(1400, 140, 0x6f7d6a, 0x7c8a76);
grid.material.opacity = 0.25;
grid.material.transparent = true;
grid.position.y = 0.02;
scene.add(grid);

// ---------- track (closed loop) ----------
const loopPts = [
  [-150,  -70], [-60, -120], [ 60, -110], [150, -55],
  [165,  40], [ 90, 110], [-30, 120], [-120, 80], [-175, 5]
].map(([x, z]) => new THREE.Vector3(x, 0, z));
const track = new THREE.CatmullRomCurve3(loopPts, true, 'catmullrom', 0.5);
const trackLen = track.getLength();
const GAUGE = 1.6;

// build the two rails by offsetting along the track normal (perpendicular, on ground)
function buildRails() {
  const N = 600;
  const left = [], right = [];
  const up = new THREE.Vector3(0, 1, 0);
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const p = track.getPointAt(t);
    const tan = track.getTangentAt(t);
    const side = new THREE.Vector3().crossVectors(tan, up).normalize().multiplyScalar(GAUGE);
    left.push(p.clone().add(side).setY(0.25));
    right.push(p.clone().sub(side).setY(0.25));
  }
  const railMat = new THREE.MeshStandardMaterial({ color: 0x3a3f44, metalness: 0.6, roughness: 0.5 });
  for (const pts of [left, right]) {
    const c = new THREE.CatmullRomCurve3(pts, true);
    const geo = new THREE.TubeGeometry(c, 700, 0.16, 6, true);
    const m = new THREE.Mesh(geo, railMat);
    m.castShadow = true; m.receiveShadow = true;
    scene.add(m);
  }
  // sleepers
  const slGeo = new THREE.BoxGeometry(GAUGE * 2.6, 0.18, 0.9);
  const slMat = new THREE.MeshStandardMaterial({ color: 0x5b4636, roughness: 1 });
  const sleeperCount = Math.floor(trackLen / 3.2);
  const sleepers = new THREE.InstancedMesh(slGeo, slMat, sleeperCount);
  sleepers.receiveShadow = true; sleepers.castShadow = true;
  const m4 = new THREE.Matrix4(), q = new THREE.Quaternion(), up2 = new THREE.Vector3(0,1,0);
  for (let i = 0; i < sleeperCount; i++) {
    const t = i / sleeperCount;
    const p = track.getPointAt(t);
    const tan = track.getTangentAt(t);
    q.setFromUnitVectors(new THREE.Vector3(0, 0, 1), tan.clone().setY(0).normalize());
    m4.compose(p.clone().setY(0.12), q, new THREE.Vector3(1, 1, 1));
    sleepers.setMatrixAt(i, m4);
  }
  scene.add(sleepers);
}
buildRails();

// ---------- a Calgary-style LRV car (light rail vehicle) ----------
const bodyMat   = new THREE.MeshStandardMaterial({ color: 0xc8ccd0, roughness: 0.55, metalness: 0.15 });
const glassMat  = new THREE.MeshStandardMaterial({ color: 0x2b3640, roughness: 0.2, metalness: 0.5 });
const trimMat   = new THREE.MeshStandardMaterial({ color: 0x9aa0a6, roughness: 0.7 });
const darkMat   = new THREE.MeshStandardMaterial({ color: 0x2a2d30, roughness: 0.8 });
const wheelMat  = new THREE.MeshStandardMaterial({ color: 0x202326, metalness: 0.5, roughness: 0.6 });

function buildLRVCar() {
  const car = new THREE.Group();
  const L = 14, W = 2.7, H = 2.6, floor = 1.05;

  // main body
  const body = new THREE.Mesh(new THREE.BoxGeometry(W, H, L), bodyMat);
  body.position.y = floor + H / 2;
  body.castShadow = true; body.receiveShadow = true;
  car.add(body);

  // roof cap (slightly inset, rounded feel)
  const roof = new THREE.Mesh(new THREE.BoxGeometry(W * 0.82, 0.45, L * 0.96), trimMat);
  roof.position.y = floor + H + 0.18;
  roof.castShadow = true;
  car.add(roof);

  // window bands on both sides
  for (const s of [1, -1]) {
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.0, L * 0.9), glassMat);
    win.position.set(s * (W / 2 + 0.001), floor + H * 0.62, 0);
    car.add(win);
  }
  // front & back windshields
  for (const z of [L / 2 + 0.001, -L / 2 - 0.001]) {
    const ws = new THREE.Mesh(new THREE.BoxGeometry(W * 0.85, 1.2, 0.08), glassMat);
    ws.position.set(0, floor + H * 0.6, z);
    car.add(ws);
  }

  // skirt / lower body accent
  const skirt = new THREE.Mesh(new THREE.BoxGeometry(W * 1.01, 0.5, L), trimMat);
  skirt.position.y = floor + 0.25;
  car.add(skirt);

  // bogies + wheels
  for (const bz of [L * 0.32, -L * 0.32]) {
    const bogie = new THREE.Mesh(new THREE.BoxGeometry(W * 0.9, 0.5, 2.6), darkMat);
    bogie.position.set(0, 0.55, bz);
    bogie.castShadow = true;
    car.add(bogie);
    for (const wx of [W * 0.42, -W * 0.42]) {
      for (const wz of [bz + 0.9, bz - 0.9]) {
        const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.25, 14), wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(wx, 0.45, wz);
        car.add(wheel);
      }
    }
  }

  // pantograph on roof
  const pivot = floor + H + 0.4;
  const pa = new THREE.Mesh(new THREE.BoxGeometry(0.07, 1.0, 0.07), darkMat);
  pa.position.set(0, pivot + 0.5, 1.5); pa.rotation.x = 0.5; car.add(pa);
  const pb = new THREE.Mesh(new THREE.BoxGeometry(0.07, 1.0, 0.07), darkMat);
  pb.position.set(0, pivot + 0.5, 0.2); pb.rotation.x = -0.5; car.add(pb);
  const bar = new THREE.Mesh(new THREE.BoxGeometry(W * 0.7, 0.06, 0.06), darkMat);
  bar.position.set(0, pivot + 1.0, 0.85); car.add(bar);

  // headlights
  for (const hx of [W * 0.3, -W * 0.3]) {
    const hl = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xfff4d0, emissive: 0xffe9a8, emissiveIntensity: 0.8 }));
    hl.position.set(hx, floor + 0.9, L / 2 + 0.05);
    car.add(hl);
  }

  return car;
}

// build a 3-car train
const CAR_COUNT = 3;
const CAR_SPACING = 15.2;           // metres between car centres
const cars = [];
for (let i = 0; i < CAR_COUNT; i++) {
  const c = buildLRVCar();
  scene.add(c);
  cars.push(c);
}

// ---------- city environment ----------
const cityGroup = new THREE.Group();
scene.add(cityGroup);

const buildingMats = [
  new THREE.MeshStandardMaterial({ color: 0x9fa6ad, roughness: 0.85 }),
  new THREE.MeshStandardMaterial({ color: 0xb4bac0, roughness: 0.9 }),
  new THREE.MeshStandardMaterial({ color: 0x868d94, roughness: 0.8 }),
  new THREE.MeshStandardMaterial({ color: 0xc6cace, roughness: 0.95 }),
];
const winMat = new THREE.MeshStandardMaterial({ color: 0x39424b, roughness: 0.3, metalness: 0.4 });

// distance from a point to the track (sampled)
const trackSamples = [];
for (let i = 0; i < 240; i++) trackSamples.push(track.getPointAt(i / 240));
function distToTrack(x, z) {
  let min = Infinity;
  for (const p of trackSamples) {
    const dx = p.x - x, dz = p.z - z, d = dx * dx + dz * dz;
    if (d < min) min = d;
  }
  return Math.sqrt(min);
}

function addBuilding(x, z, w, d, h) {
  const mat = buildingMats[(Math.random() * buildingMats.length) | 0];
  const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  b.position.set(x, h / 2, z);
  b.castShadow = true; b.receiveShadow = true;
  cityGroup.add(b);
  // window stripe to read as a building
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(w * 1.002, h * 0.8, d * 0.6), winMat);
  stripe.position.set(x, h * 0.55, z);
  cityGroup.add(stripe);
  const stripe2 = new THREE.Mesh(new THREE.BoxGeometry(w * 0.6, h * 0.8, d * 1.002), winMat);
  stripe2.position.set(x, h * 0.55, z);
  cityGroup.add(stripe2);
}

// downtown cluster (tall) near one side of the loop
const downtown = new THREE.Vector3(20, 0, -15);
for (let i = 0; i < 26; i++) {
  let x, z, tries = 0;
  do {
    x = downtown.x + (Math.random() - 0.5) * 90;
    z = downtown.z + (Math.random() - 0.5) * 90;
    tries++;
  } while (distToTrack(x, z) < 16 && tries < 40);
  const h = 30 + Math.random() * 70;
  addBuilding(x, z, 6 + Math.random() * 7, 6 + Math.random() * 7, h);
}

// suburban / mid-rise scatter across the whole map
for (let i = 0; i < 150; i++) {
  let x, z, tries = 0;
  do {
    x = (Math.random() - 0.5) * 560;
    z = (Math.random() - 0.5) * 560;
    tries++;
  } while ((distToTrack(x, z) < 14 || x*x + z*z < 30*30) && tries < 40);
  if (distToTrack(x, z) < 14) continue;
  const h = 5 + Math.random() * 22;
  addBuilding(x, z, 5 + Math.random() * 8, 5 + Math.random() * 8, h);
}

// trees
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6b4f33, roughness: 1 });
const leafMat = new THREE.MeshStandardMaterial({ color: 0x4e7a43, roughness: 1 });
for (let i = 0; i < 220; i++) {
  let x, z, tries = 0;
  do {
    x = (Math.random() - 0.5) * 620;
    z = (Math.random() - 0.5) * 620;
    tries++;
  } while (distToTrack(x, z) < 8 && tries < 30);
  if (distToTrack(x, z) < 7) continue;
  const tree = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.35, 2, 6), trunkMat);
  trunk.position.y = 1; tree.add(trunk);
  const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.6 + Math.random(), 4 + Math.random() * 2, 7), leafMat);
  leaves.position.y = 3.6; leaves.castShadow = true; tree.add(leaves);
  tree.position.set(x, 0, z);
  cityGroup.add(tree);
}

// a couple of roads (thin dark planes crossing the map)
const roadMat = new THREE.MeshStandardMaterial({ color: 0x55595d, roughness: 1 });
for (const r of [[-300, -40, 600, 9, 0], [40, -300, 9, 600, 0], [-200, 90, 520, 7, 0.5]]) {
  const [rx, rz, rw, rd, rot] = r;
  const road = new THREE.Mesh(new THREE.PlaneGeometry(rw, rd), roadMat);
  road.rotation.x = -Math.PI / 2; road.rotation.z = rot;
  road.position.set(rx + rw/2*0, rz, 0); // placeholder, set below
  road.position.set(rx, 0.03, rz);
  road.receiveShadow = true;
  cityGroup.add(road);
}

// Calgary Tower landmark in downtown
(function calgaryTower() {
  const g = new THREE.Group();
  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(2.2, 3.2, 70, 16),
    new THREE.MeshStandardMaterial({ color: 0xd2d5d8, roughness: 0.7 }));
  shaft.position.y = 35; shaft.castShadow = true; g.add(shaft);
  const pod = new THREE.Mesh(new THREE.CylinderGeometry(5.5, 4.2, 9, 16),
    new THREE.MeshStandardMaterial({ color: 0xb9bdc1, roughness: 0.6 }));
  pod.position.y = 72; pod.castShadow = true; g.add(pod);
  const top = new THREE.Mesh(new THREE.CylinderGeometry(3.4, 5.0, 5, 16),
    new THREE.MeshStandardMaterial({ color: 0x9aa0a6, roughness: 0.6 }));
  top.position.y = 79; g.add(top);
  const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 18, 6), darkMat);
  antenna.position.y = 90; g.add(antenna);
  g.position.set(downtown.x - 28, 0, downtown.z + 20);
  cityGroup.add(g);
})();

// ---------- camera control (diagonal top-down chase + drag/pinch) ----------
let camDist = 78;        // distance from train
let camYaw = Math.PI * 0.25;  // diagonal azimuth
let camPitch = 0.92;     // high angle (top-down-ish)
const camTarget = new THREE.Vector3();
const camPos = new THREE.Vector3();

// pointer / touch interaction
let dragging = false, lastX = 0, lastY = 0, pinchDist = 0;
const el = renderer.domElement;
el.addEventListener('pointerdown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('pointerup', () => { dragging = false; });
window.addEventListener('pointermove', e => {
  if (!dragging) return;
  camYaw   -= (e.clientX - lastX) * 0.005;
  camPitch += (e.clientY - lastY) * 0.004;
  camPitch = Math.max(0.45, Math.min(1.3, camPitch));
  lastX = e.clientX; lastY = e.clientY;
});
el.addEventListener('wheel', e => { camDist = Math.max(35, Math.min(160, camDist + e.deltaY * 0.05)); }, { passive: true });
el.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    if (pinchDist) camDist = Math.max(35, Math.min(160, camDist + (pinchDist - d) * 0.15));
    pinchDist = d;
  }
}, { passive: true });
el.addEventListener('touchend', () => { pinchDist = 0; });

// ---------- animation ----------
const clock = new THREE.Clock();
let dist = 0;                       // distance travelled by lead car along track
const SPEED = 26;                   // metres/sec
const tmpPos = new THREE.Vector3();
const tmpTan = new THREE.Vector3();
const fwd = new THREE.Vector3(0, 0, 1);

function placeCar(car, distAlong) {
  let d = ((distAlong % trackLen) + trackLen) % trackLen;
  const t = d / trackLen;
  track.getPointAt(t, tmpPos);
  track.getTangentAt(t, tmpTan).normalize();
  car.position.copy(tmpPos);
  car.position.y = 0.55;
  // face direction of travel (+Z forward)
  car.quaternion.setFromUnitVectors(fwd, tmpTan);
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  dist += SPEED * dt;

  for (let i = 0; i < cars.length; i++) {
    placeCar(cars[i], dist - i * CAR_SPACING);
  }

  // lead car position is the camera focus
  const lead = cars[0].position;
  camTarget.lerp(lead, 0.12);

  // diagonal chase camera around the target
  const cp = Math.cos(camPitch), sp = Math.sin(camPitch);
  camPos.set(
    camTarget.x + camDist * cp * Math.sin(camYaw),
    camTarget.y + camDist * sp,
    camTarget.z + camDist * cp * Math.cos(camYaw)
  );
  camera.position.lerp(camPos, 0.15);
  camera.lookAt(camTarget);

  // keep the sun shadow box following the train
  sun.position.set(camTarget.x + 80, 130, camTarget.z + 50);
  sun.target.position.copy(camTarget);

  renderer.render(scene, camera);
}
animate();

// ---------- resize ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});
</script>
</body>
</html>
